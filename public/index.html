<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Research Chatbot — Netrunner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #F3EED9;
      --black: #0F0E0C;
      --cream-05: rgba(243, 238, 217, 0.05);
      --cream-08: rgba(243, 238, 217, 0.08);
      --cream-12: rgba(243, 238, 217, 0.12);
      --cream-20: rgba(243, 238, 217, 0.20);
      --cream-40: rgba(243, 238, 217, 0.40);
      --cream-60: rgba(243, 238, 217, 0.60);
      --cream-80: rgba(243, 238, 217, 0.80);
      --accent: #F3EED9;
      --error: #e5534b;
      --error-bg: rgba(229, 83, 75, 0.08);
      --error-border: rgba(229, 83, 75, 0.20);
      --font-title: 'Audiowide', cursive;
      --font-body: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--black);
      color: var(--cream);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--cream-08);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--cream-05);
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--font-title);
      font-size: 15px;
      font-weight: 400;
      color: var(--cream);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    header .badge {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      background: var(--cream-12);
      color: var(--cream-60);
      padding: 3px 10px;
      border-radius: 10px;
      letter-spacing: 0.03em;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      font-weight: 400;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--cream-12);
      color: var(--cream);
      border: 1px solid var(--cream-20);
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--cream-05);
      color: var(--cream-60);
      border: 1px solid var(--cream-08);
      border-bottom-left-radius: 4px;
    }

    .message.assistant a {
      color: var(--cream-80);
      text-decoration: underline;
      text-decoration-color: var(--cream-20);
      text-underline-offset: 2px;
    }

    .message.assistant a:hover {
      color: var(--cream);
      text-decoration-color: var(--cream-40);
    }

    .message.assistant strong { color: var(--cream-80); }
    .message.assistant em { color: var(--cream-40); font-style: italic; }
    .message.assistant code {
      background: var(--cream-08);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: var(--cream-80);
    }
    .message.assistant pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid var(--cream-08);
    }
    .message.assistant pre code {
      background: none;
      padding: 0;
      border: none;
      color: var(--cream-60);
    }
    .message.assistant ul, .message.assistant ol {
      padding-left: 20px;
      margin: 6px 0;
    }
    .message.assistant li {
      margin: 2px 0;
    }
    .message.assistant h1 {
      font-family: var(--font-title);
      font-size: 15px;
      font-weight: 400;
      margin: 14px 0 6px;
      color: var(--cream);
      letter-spacing: 0.02em;
    }
    .message.assistant h2 {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      margin: 10px 0 4px;
      color: var(--cream-80);
    }
    .message.assistant h3 {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      margin: 8px 0 4px;
      color: var(--cream-80);
    }
    .message.assistant hr {
      border: none;
      border-top: 1px solid var(--cream-08);
      margin: 12px 0;
    }
    .message.assistant p {
      margin: 4px 0;
    }

    .message.error {
      align-self: flex-start;
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid var(--error-border);
      border-bottom-left-radius: 4px;
      font-size: 13px;
    }

    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      color: var(--cream-40);
      font-size: 13px;
      display: none;
    }

    .typing.visible { display: flex; align-items: center; gap: 6px; }

    .typing .dots {
      display: inline-flex;
      gap: 3px;
    }

    .typing .dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--cream-40);
      animation: pulse 1.4s infinite;
      animation-fill-mode: both;
    }
    .typing .dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    #input-area {
      padding: 12px 24px 16px;
      border-top: 1px solid var(--cream-08);
      background: var(--cream-05);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #input-area textarea {
      flex: 1;
      background: var(--black);
      border: 1px solid var(--cream-12);
      color: var(--cream);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-body);
      font-weight: 400;
      line-height: 1.4;
      resize: none;
      height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
    }

    #input-area textarea:focus {
      border-color: var(--cream-40);
      box-shadow: 0 0 0 1px rgba(243, 238, 217, 0.08);
    }

    #input-area textarea::placeholder {
      color: var(--cream-20);
    }

    #input-area button {
      background: var(--cream);
      color: var(--black);
      border: none;
      padding: 0 18px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    #input-area button:hover { opacity: 0.85; }
    #input-area button:active { opacity: 0.7; }
    #input-area button:disabled {
      background: var(--cream-08);
      color: var(--cream-20);
      cursor: not-allowed;
      opacity: 1;
    }

    .welcome {
      text-align: center;
      color: var(--cream-40);
      margin: auto;
      max-width: 460px;
      padding: 0 16px;
    }
    .welcome h2 {
      font-family: var(--font-title);
      color: var(--cream);
      margin-bottom: 10px;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .welcome p {
      font-family: var(--font-body);
      margin-bottom: 24px;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.7;
      color: var(--cream-40);
    }
    .welcome .examples {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .welcome .examples button {
      background: var(--cream-05);
      border: 1px solid var(--cream-08);
      color: var(--cream-60);
      padding: 10px 14px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.4;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .welcome .examples button:hover {
      background: var(--cream-08);
      border-color: var(--cream-12);
      color: var(--cream-80);
    }

    /* Responsive */
    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      #chat-container { padding: 16px; }
      #input-area { padding: 10px 16px 14px; }
      .message { max-width: 90%; }
      .welcome { max-width: 100%; }
    }

    /* Scrollbar */
    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb {
      background: var(--cream-12);
      border-radius: 3px;
    }
    #chat-container::-webkit-scrollbar-thumb:hover { background: var(--cream-20); }
  </style>
</head>
<body>
  <header>
    <h1>X Research Chatbot</h1>
    <span class="badge">Netrunner Tax</span>
  </header>

  <div id="chat-container">
    <div class="welcome" id="welcome">
      <h2>Search X with natural language</h2>
      <p>Ask me anything about what's happening on X/Twitter. I can search tweets, look up profiles, analyze engagement, and pull conversation threads.</p>
      <div class="examples">
        <button onclick="sendExample(this)">What are people saying about crypto taxes on Solana?</button>
        <button onclick="sendExample(this)">Show me @solflare_wallet's recent tweets</button>
        <button onclick="sendExample(this)">What Solana topics are getting the most engagement this week?</button>
        <button onclick="sendExample(this)">Search for discussions about DeFi tax reporting</button>
      </div>
    </div>
    <div class="typing" id="typing">
      Searching X and analyzing<span class="dots"><span></span><span></span><span></span></span>
    </div>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Ask about tweets, profiles, or trends..." rows="1" aria-label="Message input"></textarea>
    <button id="send-btn" onclick="send()" aria-label="Send message">Send</button>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const typing = document.getElementById('typing');
    const welcome = document.getElementById('welcome');

    let messages = [];
    let isLoading = false;

    // Auto-resize textarea
    input.addEventListener('input', () => {
      input.style.height = '44px';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    function sendExample(btn) {
      input.value = btn.textContent;
      send();
    }

    // Markdown to HTML — handles the patterns Claude actually outputs
    function renderMarkdown(text) {
      // Escape HTML first to prevent XSS from tweet content
      let html = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      html = html
        // Code blocks (fenced)
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic (single *)
        .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
        // Headers
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // Horizontal rules
        .replace(/^---$/gm, '<hr>')
        // Links — [text](url)
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
        // Bare URLs (but not inside href="")
        .replace(/(^|[^"(=])(https?:\/\/[^\s&lt;)]+)/g, '$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>')
        // Unordered lists
        .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
        // Numbered lists
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

      // Wrap consecutive <li> in <ul>
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

      // Convert remaining double newlines to paragraph breaks
      html = html.replace(/\n\n/g, '</p><p>');
      // Single newlines to <br> (but not inside pre/code)
      html = html.replace(/(?<!<\/h[123]>|<\/li>|<\/ul>|<\/pre>|<hr>|<\/p>)\n(?!<)/g, '<br>');

      return html;
    }

    function addMessage(role, content) {
      if (welcome) welcome.style.display = 'none';

      const div = document.createElement('div');
      div.className = `message ${role}`;

      if (role === 'assistant') {
        div.innerHTML = renderMarkdown(content);
      } else if (role === 'error') {
        div.textContent = content;
      } else {
        div.textContent = content;
      }

      chatContainer.insertBefore(div, typing);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = '44px';

      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      typing.classList.add('visible');
      chatContainer.scrollTop = chatContainer.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        const data = await res.json();

        if (data.error) {
          addMessage('error', `Error: ${data.error}`);
        } else {
          addMessage('assistant', data.response);
          messages.push({ role: 'assistant', content: data.response });
        }
      } catch (err) {
        addMessage('error', `Connection error: ${err.message}`);
      } finally {
        typing.classList.remove('visible');
        isLoading = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    input.focus();
  </script>
</body>
</html>
