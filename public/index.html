<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F0E0C">
  <title>Noel — X Research for Netrunner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/chat.css">
  <link rel="stylesheet" href="/css/controls.css">
</head>
<body>
  <header>
    <h1>Noel</h1>
    <span class="badge">Netrunner Tax</span>
    <div class="header-spacer"></div>
    <div class="usage-bar" id="usage-bar">
      <div class="track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="API usage">
        <div class="fill" style="width: 0%"></div>
      </div>
      <span class="label">0/200</span>
    </div>
    <button type="button" class="btn-icon" id="export-btn" aria-label="Copy conversation to clipboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>
    <button type="button" class="btn-icon" id="deep-dive-btn"
      aria-label="Deep Dive mode: off" aria-pressed="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </button>
  </header>

  <div id="chat-container">
    <div class="welcome" id="welcome">
      <h2>Noel — X Research</h2>
      <p>Netrunner Tax's research assistant. Search X/Twitter for brand mentions, competitor activity, tax news, influencer takes, and market opportunities.</p>
      <div class="examples">
        <button type="button" data-action="digest" aria-label="Run morning brief digest">Run Morning Brief</button>
        <button type="button" onclick="sendExample(this)">What are people saying about @NetrunnerTax?</button>
        <button type="button" onclick="sendExample(this)">How are Koinly and CoinTracker positioning themselves?</button>
        <button type="button" onclick="sendExample(this)">What crypto tax topics are trending this week?</button>
        <button type="button" onclick="sendExample(this)">Find opportunities — who's looking for crypto tax help?</button>
      </div>
    </div>
    <div class="typing" id="typing">
      Searching X and analyzing<span class="dots"><span></span><span></span><span></span></span>
    </div>
  </div>

  <div id="saved-searches"></div>
  <div class="active-filters" id="active-filters"></div>

  <div class="filter-bar" id="filter-bar">
    <!-- Chips and time range injected by filters.js -->
    <button type="button" class="btn-digest" data-action="digest" aria-label="Run morning brief digest">Morning Brief</button>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Ask about tweets, profiles, or trends..." rows="1" aria-label="Message input"></textarea>
    <button type="button" id="send-btn" aria-label="Send message">Send</button>
  </div>

  <div aria-live="polite" id="live-region" class="sr-only"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
